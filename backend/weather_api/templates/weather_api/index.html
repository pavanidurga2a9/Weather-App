{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Forecast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        glass: 'rgba(255, 255, 255, 0.25)',
                    }
                }
            }
        }
    </script>
</head>
<body id="appBody" class="bg-gradient-to-br from-blue-900 to-purple-900 min-h-screen text-white flex items-center justify-center p-4">

    <div class="glass-container max-w-md w-full p-8 rounded-3xl shadow-2xl backdrop-blur-xl border border-white/20">
        
        <!-- Header & Toggle -->
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold tracking-wide">Weather</h1>
            <div class="flex items-center bg-white/10 p-1 rounded-full border border-white/20">
                <button id="toggleC" onclick="setUnit('C')" class="px-3 py-1 rounded-full text-xs font-semibold transition-all duration-300 bg-blue-500 text-white shadow-md">°C</button>
                <button id="toggleF" onclick="setUnit('F')" class="px-3 py-1 rounded-full text-xs font-semibold transition-all duration-300 text-gray-300 hover:text-white">°F</button>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="flex items-center space-x-2 mb-8">
            <input type="text" id="cityInput" placeholder="Enter city name..." 
                class="w-full bg-white/10 border border-white/30 rounded-full px-5 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400 placeholder-gray-300 transition" />
            <button onclick="searchWeather()" 
                class="bg-blue-500 hover:bg-blue-600 text-white p-3 rounded-full transition shadow-lg flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </button>
        </div>

        <!-- Weather Card (Hidden initially) -->
        <div id="weatherCard" class="hidden animate-fade-in text-center mb-8 p-6 bg-white/10 rounded-2xl border border-white/10 shadow-inner">
            <h2 id="cityName" class="text-2xl font-semibold mb-2">London</h2>
            <p id="weatherDesc" class="text-gray-200 capitalize mb-4">Cloudy</p>
            
            <div class="flex justify-center items-center mb-4">
                <img id="weatherIcon" src="" alt="Weather Icon" class="w-20 h-20 drop-shadow-md">
                <span id="temperature" class="text-6xl font-bold ml-2">15°</span>
            </div>
            
            <div class="flex justify-between text-sm text-gray-200 px-4">
                <div class="flex flex-col items-center">
                    <span class="font-medium">Humidity</span>
                    <span id="humidity">82%</span>
                </div>
                <div class="flex flex-col items-center">
                    <span class="font-medium">Wind</span>
                    <span id="windSpeed">3 km/h</span>
                </div>
            </div>

            <!-- 5-Day Forecast -->
            <hr class="border-white/20 my-6">
            <div class="text-left">
                <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">5-Day Forecast</h3>
                <div id="forecastContainer" class="grid grid-cols-5 gap-2 text-center">
                    <!-- Forecast columns injected here -->
                </div>
            </div>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="hidden text-red-300 text-center mb-4 bg-red-900/40 p-3 rounded-lg border border-red-500/30"></div>

        <!-- Recent Searches -->
        <div>
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider">Recent Searches</h3>
                <button id="clearHistoryBtn" onclick="clearAllHistory()" class="hidden text-xs text-red-300 hover:text-red-400 hover:underline transition">Clear All</button>
            </div>
            <div id="historyList" class="flex flex-wrap gap-2">
                <!-- History items injected here -->
            </div>
        </div>

    </div>

    <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
